<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <link class="icon" type="image/png" href="img/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAKO VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    screens: { 'xs': '400px' },
                    colors: { 
                        'jako-bg': 'var(--jako-bg)',
                        'jako-text': 'var(--jako-text)',
                        'jako-border': 'var(--jako-border)',
                        'jako-glass': 'var(--jako-glass)',
                        'jako-led': 'var(--jako-led)',
                    },
                    fontFamily: { 
                        'sans': ['Orbitron', 'sans-serif'],
                        'mono': ['Orbitron', 'monospace'],
                        'body': ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        :root[data-theme="dark"] {
            --jako-bg: rgba(0, 0, 0, 0.95);
            --jako-text: #ffffff;
            --jako-border: rgba(255, 255, 255, 0.02);
            --jako-glass: rgba(0, 0, 0, 0.5);
            --jako-led: rgba(255, 255, 255, 0.75);
            --gradient-start: rgba(255, 255, 255, 0.03);
            --gradient-mid: rgba(5, 5, 8, 0.85);
            --gradient-end: #000000;
        }
        :root[data-theme="white"] {
            --jako-bg: #f8f9fa;
            --jako-text: #000000;
            --jako-border: rgba(0, 0, 0, 0.08);
            --jako-glass: rgba(255, 255, 255, 0.4);
            --jako-led: rgba(0, 0, 0, 0.85);
            --gradient-start: rgba(0, 0, 0, 0.02);
            --gradient-mid: rgba(248, 249, 250, 0.85);
            --gradient-end: #ffffff;
        }

        body { 
            scroll-behavior: smooth; 
            letter-spacing: 0.05em;  
            overscroll-behavior: none;
            background-color: var(--jako-bg);
            color: var(--jako-text);
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        #page-bg-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, var(--gradient-start) 15%, var(--gradient-mid) 80%, var(--gradient-end) 100%);
            z-index: -1;
            transform: translateZ(0);
        }

        :root[data-theme="dark"] .active-led {
            text-shadow: 0 0 10px var(--jako-led), 0 0 4px var(--jako-led) !important;
        }
        :root[data-theme="white"] .active-led {
            text-shadow: 0 0 6px var(--jako-led) !important;
        }
        
        #artepanel-mask-wrapper {
        -webkit-mask-image: -webkit-radial-gradient(white, black); /* Hack nativo de Safari para congelar bordes redondeados */
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
        }
    </style>
</head>
<body class="antialiased selection:bg-jako-text selection:text-jako-bg overflow-x-hidden min-h-screen">

    <div id="page-bg-overlay"></div>

    <main id="main-vault" class="w-full flex-1 flex flex-col justify-center items-center min-h-screen relative overflow-hidden"> 
        <div class="w-full flex flex-col items-center justify-center p-4 sm:p-6 select-none relative z-10">
            <div class="relative w-full max-w-[340px] sm:max-w-[400px] md:max-w-[450px] aspect-square flex flex-col items-center justify-center gap-6">
                
                <div id="artepanel-pack-container" class="relative w-[65vw] h-[65vw] sm:w-[50vw] sm:h-[50vw] md:w-[38vh] md:h-[38vh] max-w-[270px] max-h-[270px] min-w-[180px] min-h-[180px] aspect-square shrink-0 drop-shadow-[0_25px_55px_rgba(0,0,0,0.85)] cursor-pointer">
                    <div id="artepanel-mask-wrapper" class="w-full h-full relative overflow-hidden rounded-full transition-all duration-500" style="background-image: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-mid) 50%, var(--gradient-end) 100%);">
                        
                        <div class="absolute inset-0 flex items-center justify-center p-0 z-20">
                            <svg id="laser-vector-target" viewBox="0 0 400 400" class="w-full h-full fill-none stroke-current text-jako-text transition-all duration-700 ease-out origin-center style-gpu">
                                
                                <g id="wave-quantum-container" style="transform-origin: 200px 200px; -webkit-transform-origin: 200px 200px;" class="-rotate-90"></g>

<g id="sandwatch-group" class="origin-center opacity-100 transition-all duration-500 style-gpu" style="will-change: opacity;">
    <!-- Top-shrinking outer frame path -->
    <path id="sandwatch-frame" d="M 90,90 L 310,90 L 90,310 L 310,310 Z" class="stroke-current opacity-20 transition-all duration-500" />
    <path id="sandwatch-top-arc" d="M 90,90 Q 200,125 310,90" class="stroke-current opacity-20 transition-all duration-500" />
    <path id="sandwatch-bottom-arc" d="M 90,310 Q 200,275 310,310" stroke-dasharray="3 3" class="stroke-current opacity-20" />
    <text id="z-dial" x="200" y="218" text-anchor="middle" class="fill-current font-black text-[45px] tracking-[0.35em] font-sans">1P1</text>
</g>
                            </svg>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // =========================================================================
        // Z-DIAL ENGINE v8.2 — FLUID BIOCKINETIC TRANSDUCER
        // =========================================================================

        const VECTOR_TO_CLOCK_INDEX = {
            'P': 1,  'U': 2,  'L': 3,  'S': 4,
            'PL': 5, 'PU': 6, 'LU': 7, 'SU': 8,
            'PUL': 9,'LPS': 10,'SPU': 11,'ULS': 12
        };

        const VECTOR_DICTIONARY_EN = {
            'P':   'PACE',
            'U':   'PUSH',
            'L':   'PULL',
            'S':   'SURGE',
            'PL':  'PACE WITH PULL',
            'PU':  'PACE WITH PUSH',
            'LU':  'PULL WITH PUSH',
            'SU':  'SURGE WITH PUSH',
            'PUL': 'PACE WITH PUSH AND PULL',
            'LPS': 'PULL WITH PACE AND SURGE',
            'SPU': 'SURGE WITH PACE AND PUSH',
            'ULS': 'PUSH WITH PULL AND SURGE'
        };

        let biokineticWaveHistory = [];
        let isDialTextRevealed = true;
        const $ = id => document.getElementById(id);

// -------------------------------------------------------------------------
        // 1. CONCENTRIC WAVES RENDERER (Zero Point Core Geometry)
        // -------------------------------------------------------------------------
        function renderBiokineticWaves() {
            const container = $('wave-quantum-container');
            if (!container || biokineticWaveHistory.length === 0) return;

            let htmlContent = '';
            biokineticWaveHistory.forEach((dial, tIndex) => {
                const currentScale = tIndex * 1; 
                
                // Pure binary state: 
                // When sandwatch is active (isDialTextRevealed = true), waves are 0.
                // When toggled (isDialTextRevealed = false), render full wave intensity without text bleed.
                const baseOpacity = isDialTextRevealed ? 0 : (1.0 - (tIndex * 0.07));
                if (baseOpacity <= 0) return;

                const viewFactor = 18; 
                const layers = [
                    // Internal Wave (Sets / Zero Point Core = Delta Gradient Δ)
                    { id: 'internal',     r: (currentScale * 1.0) * viewFactor, opacity: baseOpacity * 0.70, value: dial.sets },
                    // Intermediate Wave (P.U.L.S. Vector / Neural Channel)
                    { id: 'intermediate', r: (currentScale * 1.4) * viewFactor, opacity: baseOpacity * 0.55, value: dial.vector },
                    // External Wave (Reps / Tensional Perimeter)
                    { id: 'external',     r: (currentScale * 1.8) * viewFactor, opacity: baseOpacity * 0.40, value: dial.reps }
                ];

                layers.forEach(layer => {
                    if (layer.r <= 0) return;
                    const circumference = 2 * Math.PI * layer.r;
                    const angle = (layer.value - 1) * 30; 
                    const arcLength = (layer.value / 12) * circumference;
                    const dashArray = `${arcLength} ${circumference}`;

                    htmlContent += `
                        <circle 
                            id="wave-${layer.id}-t${tIndex}" 
                            cx="200" 
                            cy="200" 
                            r="${layer.r}" 
                            transform="rotate(${angle} 200 200)"
                            class="stroke-current"
                            stroke-width="${tIndex === 0 ? 1.5 : 1.0}"
                            stroke-opacity="${layer.opacity}"
                            stroke-dasharray="${dashArray}"
                            stroke-linecap="round"
                            fill="none"
                        />`;
                });
            });
            container.innerHTML = htmlContent;
        }

        // -------------------------------------------------------------------------
        // 2. RESONANCE GRADIENT (Δ) ENGINE & BIOCIRCADIAN CYCLE
        // -------------------------------------------------------------------------
        function updateZ() {
            const now = new Date();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const ms = now.getMilliseconds();

            let rawTension = 0;   // Structural Load / Tissue Strain (Perimeter / Reps)
            let rawFrequency = 0; // Neuromuscular Velocity (Core / Sets)
            let currentAction = 'P';

            // --- SUB-SECOND ENGINE (Odd Seconds: High Frequency Pulses / Bipolar Parity) ---
            if (seconds % 2 !== 0) {
                const progress1s = ms / 1000;
                // Neural Frequency calculation and Inverse Tissue Strain (13 - Sets)
                rawFrequency = Math.floor(progress1s * 12) + 1;
                rawTension = 13 - rawFrequency;

                // Phase A: Monadic Variants via Thresholds
                if (progress1s < 0.25) currentAction = 'P';      // Continuous cadence
                else if (progress1s < 0.50) currentAction = 'U'; // Pushing decompression
                else if (progress1s < 0.75) currentAction = 'L'; // Pulling anchoring
                else currentAction = 'S';                        // Elastic surge recoil
            } 
            // --- MACRO-CYCLE ENGINE (Even Seconds: Structured Blocks) ---
            else {
                rawFrequency = Math.floor((minutes % 12) + 1);

                if (seconds < 30) {
                    // Phase B: Binary Transition Zones
                    const subSlot = Math.floor((seconds % 30) / 7.5);
                    currentAction = ["PL", "PU", "LU", "SU"][subSlot] || "PL";
                    rawTension = Math.floor((seconds % 10) + 2);
                } else {
                    // Phase C: Triadic Fascial Absorption
                    const subSlot = Math.floor(((seconds - 30) % 30) / 7.5);
                    currentAction = ["PUL", "LPS", "SPU", "ULS"][subSlot] || "ULS";
                    rawTension = Math.floor(((seconds - 30) % 10) + 3);
                }
            }

            // Base-12 bounding enforcement
            const setsStage = Math.max(1, Math.min(12, rawFrequency)); // Frequency Core
            const repsStage = Math.max(1, Math.min(12, rawTension));   // Tension Perimeter
            
            // Hardware Coordinate Signature [Sets][Vector][Reps]
            const biokineticCoordinate = `${setsStage}${currentAction}${repsStage}`;
            const vectorIndex = VECTOR_TO_CLOCK_INDEX[currentAction] || 1;

            // Cybernetic Resonance Gradient Delta (Δ = Tension / Frequency)
            const deltaGradient = (repsStage / setsStage).toFixed(2);

            // Push reading to wave-quantum buffer
            const lastSavedDial = biokineticWaveHistory[0];
            if (!lastSavedDial || lastSavedDial.rawCoord !== biokineticCoordinate) {
                biokineticWaveHistory.unshift({ 
                    sets: setsStage, 
                    vector: vectorIndex, 
                    reps: repsStage, 
                    delta: deltaGradient,
                    rawCoord: biokineticCoordinate 
                });
                if (biokineticWaveHistory.length > 12) biokineticWaveHistory.pop();
            }

            renderBiokineticWaves();

            // ---------------------------------------------------------------------
            // 3. HUD TRANSLATION & MATERIAL COLLAPSE RULE (Perimeter -> Core)
            // ---------------------------------------------------------------------
            const vectorText = VECTOR_DICTIONARY_EN[currentAction] || currentAction;
            
            // HUD Syntax: [Reps] [Vector] AT FREQUENCY X[Sets]
            const translatedHudText = `${repsStage} ${vectorText} AT FREQUENCY X${setsStage}`;

            // Biomechanical Diagnostic Engine
            let diagnosticMsg = "";
            if (deltaGradient > 1.0) {
                diagnosticMsg = `Tension Dominance (Δ=${deltaGradient}). Prescribing active push decompression.`;
            } else if (deltaGradient < 1.0) {
                diagnosticMsg = `Frequency Dominance (Δ=${deltaGradient}). Prescribing tensile pull anchoring.`;
            } else {
                diagnosticMsg = `Fascial Homeostasis (Δ=${deltaGradient}). High integrity fine tuning active.`;
            }

            // Interface injection
            const elDial = $('z-dial');
            const elDialHud = $('z-dial-hud');
            const elDiagnostic = $('z-dial-diagnostic');

            if (elDial) elDial.textContent = biokineticCoordinate;
            if (elDialHud) elDialHud.textContent = translatedHudText;
            if (elDiagnostic) elDiagnostic.textContent = diagnosticMsg;
        }

// -------------------------------------------------------------------------
        // 4. INITIALIZATION & EVENT LISTENERS
        // -------------------------------------------------------------------------
        document.addEventListener('DOMContentLoaded', () => {
            updateZ();
            setInterval(updateZ, 1000);

            const container = $('artepanel-pack-container');
            if (container) {
                container.addEventListener('click', () => {
                    // Toggle visualization state
                    isDialTextRevealed = !isDialTextRevealed;
                    
                    const sandwatchGroup = $('sandwatch-group');
                    const sandwatchFrame = $('sandwatch-frame');
                    const sandwatchTopArc = $('sandwatch-top-arc');
                    const vectorTarget = $('laser-vector-target');

                    if (sandwatchFrame && sandwatchTopArc) {
                        if (!isDialTextRevealed) {
                            // Shrink top vertices inward towards center axis (X: 160, 240)
                            sandwatchFrame.setAttribute('d', 'M 160,90 L 240,90 L 90,310 L 310,310 Z');
                            sandwatchTopArc.setAttribute('d', 'M 160,90 Q 200,105 240,90');
                        } else {
                            // Restore initial expanded geometry
                            sandwatchFrame.setAttribute('d', 'M 90,90 L 310,90 L 90,310 L 310,310 Z');
                            sandwatchTopArc.setAttribute('d', 'M 90,90 Q 200,125 310,90');
                        }
                    }

                    if (sandwatchGroup) {
                        // Completely hide sandwatch layout on wave mode
                        sandwatchGroup.style.opacity = isDialTextRevealed ? "1" : "0";
                    }

                    if (vectorTarget) {
                        // Satellite zoom perspective shift
                        vectorTarget.style.transform = isDialTextRevealed 
                            ? "scale(1) rotate(0deg)" 
                            : "scale(0.72) rotate(-12deg)";
                    }
                    
                    // Re-render wave patterns
                    renderBiokineticWaves();
                    
                    // Trigger haptic feedback if supported
                    if (navigator.vibrate) navigator.vibrate(10);
                });
            }
        });
    </script>
</body>
</html>
